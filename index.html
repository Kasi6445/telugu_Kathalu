<body>

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <div class="splash-ring r1"></div>
    <div class="splash-ring r2"></div>
    <div class="splash-ring r3"></div>
    <div class="logo-wrap">
      <div class="logo-icon">📖</div>
      <div class="logo-title">తెలుగు కథలు</div>
      <div class="logo-sub">Telugu Stories Platform</div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" style="display:none;">

    <!-- STICKY HEADER -->
    <header id="main-header">
      <div class="header-top">
        <div class="header-brand">
          <span class="brand-icon">📖</span>
          <span class="brand-name">తెలుగు కథలు</span>
        </div>
        <div class="header-icons">
          <a href="/favorites.html" class="header-fav-link" title="నా కథలు">♡</a>
          <div class="lang-switch" id="lang-switch" role="group" aria-label="Language selector">
            <button class="lang-btn active" data-lang="te" onclick="setLang('te')" aria-pressed="true">తెలుగు</button>
            <button class="lang-btn" data-lang="te_en" onclick="setLang('te_en')" aria-pressed="false">తె-EN</button>
            <button class="lang-btn" data-lang="en" onclick="setLang('en')" aria-pressed="false">English</button>
          </div>
          <button class="header-search" onclick="toggleSearch()" aria-label="కథలు వెతకండి">🔍</button>
        </div>
      </div>

      <!-- CATEGORY PILLS -->
      <nav id="cat-nav" aria-label="కేటగిరీలు">
        <button class="nav-pill active" onclick="filterCategory('all', this)" aria-pressed="true">అన్నీ</button>
        <button class="nav-pill" onclick="filterCategory('neeti', this)" aria-pressed="false">నీతి కథలు</button>
        <button class="nav-pill" onclick="filterCategory('podupu', this)" aria-pressed="false">పొడుపు కథలు</button>
        <button class="nav-pill" onclick="filterCategory('tenali', this)" aria-pressed="false">తెనాలి రామ</button>
        <button class="nav-pill" onclick="filterCategory('panchatantra', this)" aria-pressed="false">పంచతంత్రం</button>
        <button class="nav-pill" onclick="filterCategory('ramayana', this)" aria-pressed="false">రామాయణం</button>
        <button class="nav-pill" onclick="filterCategory('samethalu', this)" aria-pressed="false">సామెతలు</button>
        <button class="nav-pill" onclick="filterCategory('janapada', this)" aria-pressed="false">జానపదం</button>
        <button class="nav-pill" onclick="filterCategory('bhagavatam', this)" aria-pressed="false">భాగవతం</button>
      </nav>

      <!-- SEARCH BAR -->
      <div id="search-bar">
        <input id="search-input" type="search" placeholder="కథలు వెతకండి..." oninput="onSearchInput(this.value)">
        <button id="search-close" onclick="closeSearch()" aria-label="వెతకడం మూయండి">✕</button>
      </div>

      <!-- SUBCATEGORY ROW -->
      <div id="sub-row"></div>
    </header>

    <main id="main-content">

      <!-- HERO BANNER -->
      <div id="hero-banner" class="hero-banner">
        <div class="hero-inner">
          <div class="hero-badge-wrap">
            <span class="hero-category-badge">నేటి కథ</span>
          </div>
          <h1 id="hero-title">లోడ్ అవుతోంది...</h1>
          <p id="hero-moral"></p>
          <a class="hero-btn" id="hero-btn" href="/">▶ చదవండి</a>
        </div>
        <div class="hero-thumb" id="hero-thumb"></div>
      </div>

      <!-- CATEGORIES GRID -->
      <section class="section" id="section-categories">
        <div class="section-header">
          <div class="section-title-wrap">
            <span class="section-icon-box" style="background:rgba(255,107,53,0.15)">🗂️</span>
            <div>
              <div class="section-name">విభాగాలు</div>
              <div class="section-sub">అన్ని కేటగిరీలు</div>
            </div>
          </div>
        </div>
        <div class="cat-grid">
          <button class="cat-card" style="background:rgba(255,107,53,0.1);border-color:rgba(255,107,53,0.2)"
            onclick="filterCategory('neeti', null)">
            <div class="cat-emoji">📚</div>
            <div class="cat-name" data-cat-name="neeti" style="color:#FF6B35">నీతి కథలు</div>
            <div class="cat-count" id="count-neeti">0 కథలు</div>
          </button>
          <button class="cat-card" style="background:rgba(99,153,34,0.1);border-color:rgba(99,153,34,0.2)"
            onclick="filterCategory('podupu', null)">
            <div class="cat-emoji">🧩</div>
            <div class="cat-name" data-cat-name="podupu" style="color:#97C459">పొడుపు కథలు</div>
            <div class="cat-count" id="count-podupu">0 కథలు</div>
          </button>
          <button class="cat-card" style="background:rgba(127,119,221,0.1);border-color:rgba(127,119,221,0.2)"
            onclick="filterCategory('tenali', null)">
            <div class="cat-emoji">🎭</div>
            <div class="cat-name" data-cat-name="tenali" style="color:#AFA9EC">తెనాలి రామ</div>
            <div class="cat-count" id="count-tenali">0 కథలు</div>
          </button>
          <button class="cat-card" style="background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.2)"
            onclick="filterCategory('panchatantra', null)">
            <div class="cat-emoji">🐒</div>
            <div class="cat-name" data-cat-name="panchatantra" style="color:#5DCAA5">పంచతంత్రం</div>
            <div class="cat-count" id="count-panchatantra">0 కథలు</div>
          </button>
          <button class="cat-card" style="background:rgba(212,83,126,0.1);border-color:rgba(212,83,126,0.2)"
            onclick="filterCategory('ramayana', null)">
            <div class="cat-emoji">🏹</div>
            <div class="cat-name" data-cat-name="ramayana" style="color:#ED93B1">రామాయణం</div>
            <div class="cat-count" id="count-ramayana">0 కథలు</div>
          </button>
          <button class="cat-card" style="background:rgba(186,117,23,0.1);border-color:rgba(186,117,23,0.2)"
            onclick="filterCategory('samethalu', null)">
            <div class="cat-emoji">💬</div>
            <div class="cat-name" data-cat-name="samethalu" style="color:#EF9F27">సామెతలు</div>
            <div class="cat-count" id="count-samethalu">0 కథలు</div>
          </button>
          <button class="cat-card" style="background:rgba(55,138,221,0.1);border-color:rgba(55,138,221,0.2)"
            onclick="filterCategory('janapada', null)">
            <div class="cat-emoji">🪘</div>
            <div class="cat-name" data-cat-name="janapada" style="color:#85B7EB">జానపదం</div>
            <div class="cat-count" id="count-janapada">0 కథలు</div>
          </button>
          <button class="cat-card" style="background:rgba(232,168,56,0.1);border-color:rgba(232,168,56,0.2)"
            onclick="filterCategory('bhagavatam', null)">
            <div class="cat-emoji">🙏</div>
            <div class="cat-name" data-cat-name="bhagavatam" style="color:#E8A838">భాగవతం</div>
            <div class="cat-count" id="count-bhagavatam">0 కథలు</div>
          </button>
        </div>
      </section>

      <!-- RECENT STORIES -->
      <section class="section" id="section-recent">
        <div class="section-header">
          <div class="section-title-wrap">
            <span class="section-icon-box" style="background:rgba(99,153,34,0.15)">🆕</span>
            <div>
              <div class="section-name">కొత్త కథలు</div>
              <div class="section-sub">Recently added</div>
            </div>
          </div>
          <button class="see-all" onclick="filterCategory('all', null)">అన్నీ చూడండి</button>
        </div>
        <div class="cards-row" id="recent-stories"></div>
      </section>

      <!-- ALL STORIES GRID -->
      <section class="section" id="section-all">
        <div class="section-header">
          <div class="section-title-wrap">
            <span class="section-icon-box" style="background:rgba(255,107,53,0.15)">📖</span>
            <div>
              <div class="section-name" id="all-section-title">అన్ని కథలు</div>
              <div class="section-sub" id="all-section-sub">All stories</div>
            </div>
          </div>
        </div>
        <div class="stories-grid" id="all-stories"></div>
      </section>

    </main>
  </div>

  <script>
    const CATEGORIES = {
      neeti:        { name: 'నీతి కథలు',   te_en: 'Niti Kathalu',      en: 'Moral Stories',   emoji: '📚', color: '#FF6B35' },
      podupu:       { name: 'పొడుపు కథలు', te_en: 'Podupu Kathalu',    en: 'Riddle Stories',  emoji: '🧩', color: '#97C459' },
      tenali:       { name: 'తెనాలి రామ',  te_en: 'Tenaali Raama',     en: 'Tenali Rama',     emoji: '🎭', color: '#AFA9EC' },
      panchatantra: { name: 'పంచతంత్రం',   te_en: 'Panchatantran',     en: 'Panchatantra',    emoji: '🐒', color: '#5DCAA5' },
      ramayana:     { name: 'రామాయణం',     te_en: 'Raamaayanan',       en: 'Ramayana',        emoji: '🏹', color: '#ED93B1' },
      samethalu:    { name: 'సామెతలు',     te_en: 'Saametalu',         en: 'Proverbs',        emoji: '💬', color: '#EF9F27' },
      janapada:     { name: 'జానపదం',      te_en: 'Jaanapadan',        en: 'Folk Tales',      emoji: '🪘', color: '#85B7EB' },
      bhagavatam:   { name: 'భాగవతం',     te_en: 'Bhaagavatan',       en: 'Bhagavatam',      emoji: '🙏', color: '#E8A838' }
    };

    const UI_TEXT = {
      te: {
        brand:          'తెలుగు కథలు',
        all:            'అన్నీ',
        catName:        'విభాగాలు',
        catSub:         'అన్ని కేటగిరీలు',
        recentName:     'కొత్త కథలు',
        recentSub:      'Recently added',
        seeAll:         'అన్నీ చూడండి',
        allStories:     'అన్ని కథలు',
        stories:        'కథలు',
        heroBadge:      'నేటి కథ',
        heroBtn:        '▶ చదవండి',
        search:         'కథలు వెతకండి...',
        searchResults:  'వెతుకు ఫలితాలు',
      },
      te_en: {
        brand:          'Telugu Stories',
        all:            'All',
        catName:        'Categories',
        catSub:         'Browse all categories',
        recentName:     'New Stories',
        recentSub:      'Recently added',
        seeAll:         'See All',
        allStories:     'All Stories',
        stories:        'stories',
        heroBadge:      "Today's Story",
        heroBtn:        '▶ Read',
        search:         'Search stories...',
        searchResults:  'Search Results',
      },
      en: {
        brand:          'Telugu Stories',
        all:            'All',
        catName:        'Categories',
        catSub:         'Browse all categories',
        recentName:     'New Stories',
        recentSub:      'Recently added',
        seeAll:         'See All',
        allStories:     'All Stories',
        stories:        'stories',
        heroBadge:      "Today's Story",
        heroBtn:        '▶ Read',
        search:         'Search stories...',
        searchResults:  'Search Results',
      }
    };

    let allStories     = [];
    let categoriesData = {};
    let heroStoryId    = null;
    let currentCat     = 'all';
    let currentSub     = 'all';
    let searchQuery    = '';
    let searchLang     = 'te';

    // ── SPLASH ──────────────────────────────────────────────────────────────
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('splash').style.display = 'none';
          document.getElementById('app').style.display = 'block';
          document.getElementById('app').style.animation = 'fadeIn 0.5s ease';
        }, 600);
      }, 2000);
    });

    // ── LOAD DATA ────────────────────────────────────────────────────────────
    async function loadCategories() {
      try {
        const res = await fetch('categories.json');
        categoriesData = await res.json();
      } catch(e) { categoriesData = {}; }
    }

    async function loadStories() {
      try {
        const res = await fetch('stories/index.json');
        const data = await res.json();
        allStories = data.stories || [];

        if (allStories.length > 0) {
          const hero = allStories[0];
          heroStoryId = hero.id;
          document.getElementById('hero-title').textContent = hero.title;
          document.getElementById('hero-moral').textContent = hero.moral;
          const cat = CATEGORIES[hero.category] || CATEGORIES.neeti;
          document.querySelector('.hero-category-badge').textContent = cat.name;
          document.getElementById('hero-thumb').style.backgroundImage = `url('${hero.thumbnail}')`;

          // Update OG tags with latest story data
          setMeta('og:title', hero.title + ' - తెలుగు కథలు');
          setMeta('og:description', hero.moral || 'ప్రతి రోజు కొత్త తెలుగు కథలు');
          setMeta('og:image', 'https://www.telugukathalu.in/' + hero.thumbnail);

          // Give the hero button a real href so Googlebot can follow it
          const heroBtn = document.getElementById('hero-btn');
          if (heroBtn) heroBtn.href = `story.html?id=${hero.slug || hero.id}`;
        }

        Object.keys(CATEGORIES).forEach(cat => {
          const count = allStories.filter(s => s.category === cat).length;
          const el = document.getElementById(`count-${cat}`);
          if (el) el.textContent = `${count} కథలు`;
        });

        renderRecentStories(allStories.slice(0, 8));
        applyFilters();
      } catch(e) {
        document.getElementById('all-stories').innerHTML =
          '<p class="no-stories">కథలు కనుగొనలేదు</p>';
      }
    }

    function setMeta(property, content) {
      let el = document.querySelector(`meta[property="${property}"]`);
      if (!el) {
        el = document.createElement('meta');
        el.setAttribute('property', property);
        document.head.appendChild(el);
      }
      el.setAttribute('content', content);
    }

    // ── RENDER ───────────────────────────────────────────────────────────────
    function catLabel(cat) {
      if (searchLang === 'en')    return cat.en;
      if (searchLang === 'te_en') return cat.te_en;
      return cat.name;
    }

    function renderRecentStories(stories) {
      const container = document.getElementById('recent-stories');
      container.innerHTML = '';
      stories.forEach(story => {
        const cat = CATEGORIES[story.category] || CATEGORIES.neeti;
        const displayTitle = searchLang === 'en' && story.title_en ? story.title_en
          : searchLang === 'te_en' && story.title_te_en ? story.title_te_en
          : story.title;
        const card = document.createElement('a');
        card.className = 'h-card';
        card.href = `story.html?id=${story.slug || story.id}`;
        card.setAttribute('aria-label', displayTitle);
        card.innerHTML = `
          <div class="h-card-img">
            <img loading="lazy" src="${story.thumbnail}" alt="${displayTitle}">
            <span class="h-cat-badge" style="color:${cat.color}">${cat.emoji}</span>
          </div>
          <div class="h-card-body">
            <div class="h-card-title">${displayTitle}</div>
            <div class="h-card-meta">${catLabel(cat)}</div>
          </div>`;
        container.appendChild(card);
      });
    }

    function renderAllStories(stories) {
      const container = document.getElementById('all-stories');
      container.innerHTML = '';
      if (stories.length === 0) {
        container.innerHTML = `<p class="no-stories">${searchLang === 'en' ? 'No stories found' : 'ఈ విభాగంలో కథలు లేవు'}</p>`;
        return;
      }
      stories.forEach(story => {
        const cat = CATEGORIES[story.category] || CATEGORIES.neeti;
        const displayTitle = searchLang === 'en' && story.title_en ? story.title_en
          : searchLang === 'te_en' && story.title_te_en ? story.title_te_en
          : story.title;
        const displayMoral = searchLang === 'en' && story.moral_en ? story.moral_en
          : searchLang === 'te_en' && story.moral_te_en ? story.moral_te_en
          : story.moral;
        const card = document.createElement('a');
        card.className = 'v-card';
        const fromParam = currentCat !== 'all' ? `&from=${currentCat}` : '';
        card.href = `story.html?id=${story.slug || story.id}${fromParam}`;
        card.setAttribute('aria-label', displayTitle);
        card.innerHTML = `
          <div class="v-card-img">
            <img loading="lazy" src="${story.thumbnail}" alt="${displayTitle}">
            <span class="v-cat-tag" style="background:rgba(0,0,0,0.6);color:${cat.color}">${cat.emoji} ${catLabel(cat)}</span>
          </div>
          <div class="v-card-body">
            <div class="v-card-title">${displayTitle}</div>
            <p class="v-card-moral">💡 ${displayMoral}</p>
            <div class="v-card-date">${story.date}</div>
          </div>`;
        container.appendChild(card);
      });
    }

    // ── FILTER / SEARCH ──────────────────────────────────────────────────────
    function applyFilters() {
      let filtered = allStories;
      if (currentCat !== 'all')
        filtered = filtered.filter(s => s.category === currentCat);
      if (currentSub !== 'all')
        filtered = filtered.filter(s => s.subcategory === currentSub);
      if (searchQuery) {
        const q = searchQuery.toLowerCase().trim();
        if (searchLang === 'en' || searchLang === 'te_en') {
          filtered = filtered.filter(s => matchesEnglish(s, q));
        } else {
          filtered = filtered.filter(s =>
            s.title.toLowerCase().includes(q) ||
            (s.moral && s.moral.toLowerCase().includes(q))
          );
        }
      }

      const titleEl = document.getElementById('all-section-title');
      const subEl   = document.getElementById('all-section-sub');
      const t       = UI_TEXT[searchLang];
      if (searchQuery) {
        titleEl.textContent = t.searchResults;
        subEl.textContent   = `${filtered.length} ${t.stories}`;
      } else if (currentCat === 'all') {
        titleEl.textContent = t.allStories;
        subEl.textContent   = `${allStories.length} ${t.stories}`;
      } else {
        const c = CATEGORIES[currentCat];
        titleEl.textContent = catLabel(c);
        subEl.textContent   = `${filtered.length} ${t.stories}`;
      }
      renderAllStories(filtered);
    }

    function filterCategory(cat, pillEl) {
      document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
      if (pillEl) {
        pillEl.classList.add('active');
      } else {
        const match = document.querySelector(`.nav-pill[data-cat="${cat}"]`);
        if (match) match.classList.add('active');
      }
      currentCat = cat;
      currentSub = 'all';
      updatePageSections(cat);
      showSubcategoryRow(cat);
      window.scrollTo({ top: 0, behavior: 'smooth' });
      applyFilters();
    }

    function updatePageSections(cat) {
      const isAll = cat === 'all';
      document.getElementById('hero-banner').style.display        = isAll ? '' : 'none';
      document.getElementById('section-categories').style.display = isAll ? '' : 'none';
      document.getElementById('section-recent').style.display     = isAll ? '' : 'none';
    }

    function showSubcategoryRow(catKey) {
      const row = document.getElementById('sub-row');
      if (catKey === 'all' || !categoriesData[catKey]) {
        row.style.display = 'none';
        return;
      }
      const subs = categoriesData[catKey].subcategories || {};
      row.innerHTML = '';

      const allLabel = (searchLang === 'en' || searchLang === 'te_en') ? 'All' : 'అన్నీ';
      const allChip = makeSubChip(allLabel, true, () => {
        setActiveSubChip(allChip);
        currentSub = 'all';
        applyFilters();
      });
      row.appendChild(allChip);

      Object.entries(subs).forEach(([subKey, subData]) => {
        const label = (searchLang === 'en' || searchLang === 'te_en') && subData.english_name
          ? subData.english_name : subData.telugu_name;
        const chip = makeSubChip(label, false, () => {
          setActiveSubChip(chip);
          currentSub = subKey;
          applyFilters();
        });
        row.appendChild(chip);
      });
      row.style.display = 'flex';
    }

    function makeSubChip(label, active, onClick) {
      const el = document.createElement('div');
      el.className = 'sub-chip' + (active ? ' active' : '');
      el.textContent = label;
      el.onclick = onClick;
      return el;
    }

    function setActiveSubChip(el) {
      document.querySelectorAll('.sub-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
    }

    // ── LANGUAGE SWITCH ───────────────────────────────────────────────────────
    function setLang(lang) {
      searchLang = lang;
      localStorage.setItem('tk_lang', lang);
      document.querySelectorAll('#lang-switch .lang-btn').forEach(b => {
        const isActive = b.dataset.lang === lang;
        b.classList.toggle('active', isActive);
        b.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });
      applyLanguage(lang);
    }

    function applyLanguage(lang) {
      const t = UI_TEXT[lang];

      // Brand
      document.querySelector('.brand-name').textContent = t.brand;

      // Hero title + moral (use en_title/en_moral if available in story data)
      const heroStory = heroStoryId ? allStories.find(s => s.id === heroStoryId) : null;
      if (heroStory) {
        document.getElementById('hero-title').textContent =
          lang === 'en' && heroStory.title_en ? heroStory.title_en
          : lang === 'te_en' && heroStory.title_te_en ? heroStory.title_te_en
          : heroStory.title;
        document.getElementById('hero-moral').textContent =
          lang === 'en' && heroStory.moral_en ? heroStory.moral_en
          : lang === 'te_en' && heroStory.moral_te_en ? heroStory.moral_te_en
          : heroStory.moral;
      }
      document.querySelector('.hero-category-badge').textContent = t.heroBadge;
      document.getElementById('hero-btn').textContent = t.heroBtn;

      // Category section header
      document.querySelector('#section-categories .section-name').textContent = t.catName;
      document.querySelector('#section-categories .section-sub').textContent  = t.catSub;

      // Category grid card names + counts
      Object.keys(CATEGORIES).forEach(key => {
        const nameEl = document.querySelector(`[data-cat-name="${key}"]`);
        if (nameEl) nameEl.textContent = lang === 'en' ? CATEGORIES[key].en : lang === 'te_en' ? CATEGORIES[key].te_en : CATEGORIES[key].name;
        const countEl = document.getElementById(`count-${key}`);
        if (countEl) {
          const n = allStories.filter(s => s.category === key).length;
          countEl.textContent = `${n} ${t.stories}`;
        }
      });

      // Recent section header + see-all
      document.querySelector('#section-recent .section-name').textContent = t.recentName;
      document.querySelector('#section-recent .section-sub').textContent  = t.recentSub;
      document.querySelector('#section-recent .see-all').textContent      = t.seeAll;

      // Nav pills (re-render)
      renderNavPills(lang);

      // Search placeholder
      document.getElementById('search-input').placeholder = t.search;

      // Re-render cards and section title
      renderRecentStories(allStories.slice(0, 8));
      applyFilters();
    }

    function renderNavPills(lang) {
      const t   = UI_TEXT[lang];
      const nav = document.getElementById('cat-nav');
      nav.innerHTML = '';

      const allPill = document.createElement('div');
      allPill.className = 'nav-pill' + (currentCat === 'all' ? ' active' : '');
      allPill.textContent = t.all;
      allPill.dataset.cat = 'all';
      allPill.onclick = () => filterCategory('all', allPill);
      nav.appendChild(allPill);

      Object.entries(CATEGORIES).forEach(([key, cat]) => {
        const pill = document.createElement('div');
        pill.className = 'nav-pill' + (currentCat === key ? ' active' : '');
        pill.textContent = lang === 'en' ? cat.en : lang === 'te_en' ? cat.te_en : cat.name;
        pill.dataset.cat = key;
        pill.onclick = () => filterCategory(key, pill);
        nav.appendChild(pill);
      });
    }

    function matchesEnglish(story, q) {
      const slugWords = (story.slug || story.id).replace(/-/g, ' ');
      const cat = (story.category    || '').replace(/_/g, ' ');
      const sub = (story.subcategory || '').replace(/_/g, ' ');
      const catEn = CATEGORIES[story.category]?.en || '';
      const haystack = `${slugWords} ${cat} ${sub} ${catEn}`.toLowerCase();
      return q.split(/\s+/).every(word => haystack.includes(word));
    }

    // ── SEARCH ───────────────────────────────────────────────────────────────
    function toggleSearch() {
      const bar = document.getElementById('search-bar');
      const inp = document.getElementById('search-input');
      if (bar.style.display === 'flex') {
        closeSearch();
      } else {
        bar.style.display = 'flex';
        inp.focus();
      }
    }

    function closeSearch() {
      const bar = document.getElementById('search-bar');
      const inp = document.getElementById('search-input');
      bar.style.display = 'none';
      inp.value = '';
      searchQuery = '';
      applyFilters();
    }

    function onSearchInput(val) {
      searchQuery = val.trim();
      if (searchQuery) {
        document.getElementById('section-all').scrollIntoView({ behavior: 'smooth' });
      }
      applyFilters();
    }

    // ── OTHER ─────────────────────────────────────────────────────────────────
    function openHeroStory() {
      if (heroStoryId) window.location.href = `story.html?id=${heroStoryId}`;
    }

    // ── INIT ──────────────────────────────────────────────────────────────────
    Promise.all([loadCategories(), loadStories()]).then(() => {
      const savedLang = localStorage.getItem('tk_lang') || 'te';
      if (savedLang !== searchLang) setLang(savedLang);

      // Restore category view when coming back from a story page (e.g. /?cat=ramayana)
      const urlCat = new URLSearchParams(window.location.search).get('cat');
      if (urlCat && CATEGORIES[urlCat]) {
        filterCategory(urlCat, null);
      }
    });

    // ── SERVICE WORKER ────────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>

</body>

</html>
