name: Generate Stories

on:
  schedule:
    - cron: '7 */2 * * *'    # generate 12x/day
  workflow_dispatch:

concurrency:
  group: generate-stories
  cancel-in-progress: false


permissions:
  contents: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate one story
        run: python generate.py
        env:
          GCP_PROJECT_ID: telugu-kathalu-493805
          GCP_LOCATION: us-central1
          ALLOW_AI_STUDIO: 'false'
          R2_BASE_URL: https://pub-558b12062e854257a35815cd84959ad0.r2.dev

      - name: Upload draft media to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          pip install awscli --quiet
          aws s3 sync drafts/ s3://${{ secrets.R2_BUCKET_NAME }}/drafts/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --exclude "*.json" \
            --include "*.jpg" \
            --include "*.png" \
            --include "*.mp3" \
            --include "*.wav" \
            --no-progress
          find drafts/ -name "*.jpg" -delete
          find drafts/ -name "*.png" -delete
          find drafts/ -name "*.mp3" -delete
          find drafts/ -name "*.wav" -delete

      - name: Commit and push draft
        run: |
          git config user.name "story-bot"
          git config user.email "bot@users.noreply.github.com"
          git add drafts/
          git diff --quiet --cached && echo "Nothing to commit" && exit 0
          git commit -m "Add story draft $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase --autostash
          git push