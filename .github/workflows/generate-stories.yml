name: Generate Stories

on:
  schedule:
    - cron: '0 */6 * * *'    # every 6 hours (00,06,12,18 UTC)
  workflow_dispatch:           # manual "Run workflow" button

permissions:
  contents: write
  id-token: write              # REQUIRED for keyless GCP auth

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'      # set to your local Python version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate stories
        run: |
          for i in 1 2 3 4 5 6; do
            echo "--- Generating story $i of 6 ---"
            python generate.py
          done
        env:
          GCP_PROJECT_ID: telugu-kathalu-493805
          GCP_LOCATION: us-central1
          ALLOW_AI_STUDIO: 'false'

      - name: Commit and push drafts
        run: |
          git config user.name "story-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --quiet --cached || git commit -m "Add story drafts $(date -u +%Y-%m-%dT%H:%M)"
          git push