name: Generate Stories

on:
  schedule:
    - cron: '17,50 * * * *' 
  workflow_dispatch:

concurrency:
  group: generate-stories
  cancel-in-progress: false


permissions:
  contents: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate one story
        run: python generate.py
        env:
          GCP_PROJECT_ID: telugu-kathalu-493805
          GCP_LOCATION: us-central1
          ALLOW_AI_STUDIO: 'false'

      - name: Commit and push draft
        run: |
          git config user.name "story-bot"
          git config user.email "bot@users.noreply.github.com"
          git add drafts/
          git diff --quiet --cached && echo "Nothing to commit" && exit 0
          git commit -m "Add story draft $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase
          git push