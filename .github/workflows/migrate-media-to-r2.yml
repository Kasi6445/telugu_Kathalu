name: Migrate Media to R2

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install AWS CLI
        run: |
          pip install awscli --quiet

      - name: Sync media files to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync stories/ s3://${{ secrets.R2_BUCKET_NAME }}/stories/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --exclude "*.json" \
            --exclude "*.html" \
            --include "*.jpg" \
            --include "*.png" \
            --include "*.mp3" \
            --include "*.wav" \
            --no-progress

      - name: Print upload summary
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          COUNT=$(aws s3 ls s3://${{ secrets.R2_BUCKET_NAME }}/stories/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --recursive \
            | grep -E "\.(jpg|png|mp3|wav)$" \
            | wc -l)
          echo "Total media files in R2: $COUNT"
