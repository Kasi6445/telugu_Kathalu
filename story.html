<body class="slideshow-mode">

  <div id="slideshow">
    <div id="bg-image"></div>

    <!-- Top bar -->
    <div id="top-bar">
      <a href="/" id="back-link">← అన్ని కథలు</a>
      <span id="scene-counter">1 / 6</span>
      <div class="top-bar-right">
        <div class="lang-switch" id="story-lang-switch" role="group" aria-label="Language selector">
          <button class="lang-btn active" data-lang="te" onclick="storySetLang('te')" aria-pressed="true">తె</button>
          <button class="lang-btn" data-lang="te_en" onclick="storySetLang('te_en')" aria-pressed="false">తె-EN</button>
          <button class="lang-btn" data-lang="en" onclick="storySetLang('en')" aria-pressed="false">EN</button>
        </div>
        <button id="fav-btn" onclick="toggleFavorite()" title="నా కథలు">♡</button>
      </div>
    </div>

    <!-- Swipe area — covers full screen -->
    <div id="swipe-area">
      <!-- Tap zones -->
      <div id="tap-left" onclick="prevScene()"></div>
      <div id="tap-right" onclick="nextScene()"></div>
    </div>

    <!-- Bottom content -->
    <div id="bottom-content">
      <p id="slide-story-title"></p>
      <p id="slide-text"></p>

      <!-- Controls -->
      <div id="bottom-bar">
        <button class="ctrl-btn nav-btn" onclick="prevScene()">←</button>
        <button class="ctrl-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
        <button class="ctrl-btn" id="play-pause-btn" onclick="toggleCurrentAudio()">▶ వినండి</button>
        <button class="ctrl-btn nav-btn" onclick="nextScene()">→</button>
      </div>

      <!-- Speed control — pill buttons below audio controls -->
      <div id="speed-row">
        <span class="speed-label">Speed</span>
        <button class="speed-btn" onclick="setSpeed(0.75)">0.75×</button>
        <button class="speed-btn active" onclick="setSpeed(1)">1×</button>
        <button class="speed-btn" onclick="setSpeed(1.25)">1.25×</button>
        <button class="speed-btn" onclick="setSpeed(1.5)">1.5×</button>
        <button class="speed-btn" onclick="setSpeed(2)">2×</button>
      </div>

      <!-- Segmented timeline -->
      <div id="timeline"></div>
    </div>
  </div>

  <!-- Moral screen -->
  <div id="moral-screen" style="display:none;">
    <div id="moral-content">
      <div class="moral-emoji">🌟</div>
      <h2 id="moral-heading">కథ సమాప్తం</h2>
      <p id="final-title"></p>
      <div id="moral-label">నీతి</div>
      <p id="final-moral"></p>
      <button id="share-btn" onclick="shareStory()">📤 పంచుకోండి</button>
      <a href="/" class="home-btn" id="moral-home-btn">← అన్ని కథలు</a>
      <div id="related-stories"></div>
    </div>
  </div>

  <script>
    let story         = null;
    let storyFolderId = null;
    let currentIndex  = 0;
    let isPlaying     = false;
    let isMuted       = false;
    let currentSpeed  = 1.0;
    let touchStartX   = 0;
    let touchStartY   = 0;
    let imgExt        = 'jpg';
    let storyLang     = localStorage.getItem('tk_lang') || 'te';
    let _fallbackTimer = null;
    let _bgTimeout     = null;
    let _textTimeout   = null;
    let _playTimeout   = null;

    // ── WORD HIGHLIGHT STATE ───────────────────────────────────────────────────
    let _wordSpans        = [];
    let _wordOffsets      = []; // estimated start-time (seconds) per word
    let _currentWordIndex = -1;

    const CATEGORIES = {
      neeti:        'నీతి కథలు',
      podupu:       'పొడుపు కథలు',
      tenali:       'తెనాలి రామ',
      panchatantra: 'పంచతంత్రం',
      ramayana:     'రామాయణం',
      samethalu:    'సామెతలు',
      janapada:     'జానపదం',
      bhagavatam:   'భాగవతం'
    };

    // ── WORD HIGHLIGHT ────────────────────────────────────────────────────────

    // Count visible grapheme clusters — Telugu characters combine multiple
    // Unicode codepoints into one visible unit, so .length is very inaccurate.
    function graphemeCount(word) {
      if (typeof Intl !== 'undefined' && Intl.Segmenter) {
        try {
          const seg = new Intl.Segmenter(undefined, { granularity: 'grapheme' });
          return Math.max(1, [...seg.segment(word)].length);
        } catch(e) {}
      }
      // Fallback: exclude Telugu combining marks to count base characters ≈ syllables
      return Math.max(1, [...word].filter(c => {
        const cp = c.codePointAt(0);
        if (!cp) return false;
        if (cp === 0x0C4D) return false;                       // virama / halant
        if (cp >= 0x0C3E && cp <= 0x0C4C) return false;       // vowel signs
        if (cp >= 0x0C4E && cp <= 0x0C56) return false;       // other diacritics
        if (cp === 0x0C01 || cp === 0x0C02 || cp === 0x0C03) return false;
        return true;
      }).length);
    }

    // Split text into clickable word spans, wired up for click-to-seek
    function renderWordSpans(text, sceneId) {
      const textEl = document.getElementById('slide-text');
      textEl.innerHTML = '';
      _wordSpans        = [];
      _wordOffsets      = [];   // always cleared here — recomputed on first timeupdate
      _currentWordIndex = -1;
      let wi = 0;
      text.split(/(\s+)/).forEach(token => {
        if (/^\s+$/.test(token)) {
          textEl.appendChild(document.createTextNode(token));
        } else if (token.length > 0) {
          const span = document.createElement('span');
          span.textContent = token;
          span.className   = 'word-span';
          const idx = wi;
          span.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
          span.addEventListener('touchend',   e => e.stopPropagation(), { passive: true });
          span.addEventListener('click',      e => { e.stopPropagation(); seekToWord(idx, sceneId); });
          textEl.appendChild(span);
          _wordSpans.push(span);
          wi++;
        }
      });
    }

    // Proportional timing based on grapheme clusters (syllable-accurate for Telugu)
    function computeWordOffsets(duration, text) {
      const words    = text.match(/\S+/g) || [];
      const sizes    = words.map(w => graphemeCount(w));
      const total    = sizes.reduce((a, b) => a + b, 0) || 1;
      _wordOffsets   = [];
      let t = 0;
      sizes.forEach(s => { _wordOffsets.push(t); t += (s / total) * duration; });
    }

    // Apply spoken/active/upcoming classes to all spans at once (simple, correct)
    function highlightWordAtTime(t) {
      if (!_wordOffsets.length || !_wordSpans.length) return;
      let idx = _wordOffsets.length - 1;
      for (let i = 1; i < _wordOffsets.length; i++) {
        if (_wordOffsets[i] > t) { idx = i - 1; break; }
      }
      idx = Math.max(0, idx);
      if (idx === _currentWordIndex) return;
      _wordSpans.forEach((s, i) => {
        s.classList.toggle('active', i === idx);
        s.classList.toggle('spoken', i < idx);
      });
      _currentWordIndex = idx;
      _wordSpans[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function clearWordHighlight() {
      _wordSpans.forEach(s => s.classList.remove('active', 'spoken'));
      _wordOffsets      = [];   // force recompute next scene
      _currentWordIndex = -1;
    }

    function seekToWord(wordIdx, sceneId) {
      const audio = document.getElementById(`audio-${sceneId}`);
      if (!audio || !audio.duration) return;
      // Compute offsets on demand if not ready yet
      if (!_wordOffsets.length && _wordSpans.length) {
        const sc  = story.scenes.find(s => s.id === sceneId) || story.scenes[currentIndex];
        const txt = storyLang === 'en' && sc.text_en ? sc.text_en
          : storyLang === 'te_en' && sc.text_te_en ? sc.text_te_en
          : (sc.text || '');
        computeWordOffsets(audio.duration, txt);
      }
      if (wordIdx >= _wordOffsets.length) return;
      audio.currentTime = _wordOffsets[wordIdx];
      _wordSpans.forEach((s, i) => {
        s.classList.toggle('active', i === wordIdx);
        s.classList.toggle('spoken', i < wordIdx);
      });
      _currentWordIndex = wordIdx;
      if (!isPlaying) {
        if (_fallbackTimer) { clearTimeout(_fallbackTimer); _fallbackTimer = null; }
        audio.play().then(() => { isPlaying = true; updatePlayBtn(); }).catch(() => {});
      }
    }

    function getUrlParam() {
      return new URLSearchParams(window.location.search).get('id');
    }

    async function resolveFolderId(urlParam) {
      // Timestamp format — use directly (backward compat)
      if (/^\d{8}_\d{6}$/.test(urlParam)) return urlParam;
      // Slug — look up in index
      const res  = await fetch('stories/index.json');
      const data = await res.json();
      const match = (data.stories || []).find(s => s.slug === urlParam);
      return match ? match.id : null;
    }

    async function loadStory() {
      const urlParam = getUrlParam();
      if (!urlParam) { window.location.href = '/'; return; }

      try {
        storyFolderId = await resolveFolderId(urlParam);
        if (!storyFolderId) { window.location.href = '/'; return; }

        const id = storyFolderId;
        const res = await fetch(`stories/${id}/story.json`);
        story = await res.json();

        // Rewrite timestamp ID in URL to slug (without page reload)
        if (story.slug && /^\d{8}_\d{6}$/.test(urlParam)) {
          history.replaceState(null, '', `story.html?id=${story.slug}`);
        }

        // Hide lang toggle when story has no English content at all
        const storyHasEnglish = !!(story.title_en || story.title_te_en || story.scenes.some(s => s.text_en || s.text_te_en));
        const langSwitch = document.getElementById('story-lang-switch');
        if (!storyHasEnglish) {
          langSwitch.style.display = 'none';
          storyLang = 'te';
          localStorage.setItem('tk_lang', 'te');
        } else {
          langSwitch.style.display = '';
        }

        // Derive image extension from thumbnail
        imgExt = story.thumbnail ? story.thumbnail.split('.').pop() : 'jpg';

        document.title = story.title + ' - తెలుగు కథలు';
        document.getElementById('final-title').textContent =
          storyLang === 'en' && story.title_en ? story.title_en
          : storyLang === 'te_en' && story.title_te_en ? story.title_te_en
          : story.title;
        document.getElementById('final-moral').textContent =
          storyLang === 'en' && story.moral_en ? story.moral_en
          : storyLang === 'te_en' && story.moral_te_en ? story.moral_te_en
          : story.moral;

        injectJSONLD(story, storyFolderId);
        loadFavoriteState();

        // Build audio elements
        story.scenes.forEach(scene => {
          const audio = document.createElement('audio');
          audio.id           = `audio-${scene.id}`;
          audio.src          = `stories/${storyFolderId}/audio/scene${scene.id}.mp3`;
          audio.muted        = isMuted;
          audio.playbackRate = currentSpeed;
          audio.onended = () => {
            isPlaying = false;
            updatePlayBtn();
            setTimeout(() => nextScene(), 800);
          };
          document.body.appendChild(audio);
        });

        // Preload images
        story.scenes.forEach(scene => {
          const img = new Image();
          img.src = `stories/${storyFolderId}/images/scene${scene.id}.${imgExt}`;
        });

        // Build segmented timeline
        const tl = document.getElementById('timeline');
        story.scenes.forEach((_, i) => {
          const seg  = document.createElement('div');
          seg.className = 'tl-seg';
          seg.title = `Scene ${i + 1}`;
          const fill = document.createElement('div');
          fill.className = 'tl-fill';
          fill.id = `tl-fill-${i}`;
          seg.appendChild(fill);
          seg.onclick = () => goToScene(i);
          tl.appendChild(seg);
        });

        setupSwipeGesture();
        setupKeyboard();
        showScene(0);
        storySetLang(storyLang);

      } catch(e) {
        console.error(e);
      }
    }

    function showScene(index) {
      if (!story) return;

      // Cancel any stale callbacks from a previous showScene call
      if (_bgTimeout)   { clearTimeout(_bgTimeout);   _bgTimeout   = null; }
      if (_textTimeout) { clearTimeout(_textTimeout); _textTimeout = null; }
      if (_playTimeout) { clearTimeout(_playTimeout); _playTimeout = null; }

      stopAllAudio();
      currentIndex = index;
      const scene = story.scenes[index];

      const bg = document.getElementById('bg-image');
      bg.style.opacity = '0';
      _bgTimeout = setTimeout(() => {
        _bgTimeout = null;
        bg.style.backgroundImage = `url('stories/${storyFolderId}/images/scene${scene.id}.${imgExt}')`;
        bg.style.opacity = '1';
      }, 250);

      const textEl  = document.getElementById('slide-text');
      const titleEl = document.getElementById('slide-story-title');
      textEl.style.opacity = '0';
      _textTimeout = setTimeout(() => {
        _textTimeout = null;
        titleEl.textContent = storyLang === 'en' && story.title_en ? story.title_en
          : storyLang === 'te_en' && story.title_te_en ? story.title_te_en
          : story.title;
        const sceneText = storyLang === 'en' && scene.text_en ? scene.text_en
          : storyLang === 'te_en' && scene.text_te_en ? scene.text_te_en
          : scene.text;
        renderWordSpans(sceneText, scene.id);
        textEl.style.opacity = '1';
      }, 250);

      document.getElementById('scene-counter').textContent =
        `${index + 1} / ${story.scenes.length}`;

      // Update segmented timeline fills
      story.scenes.forEach((_, i) => {
        const fill = document.getElementById(`tl-fill-${i}`);
        if (!fill) return;
        if (i < index)       { fill.style.width = '100%'; fill.style.transition = 'none'; }
        else if (i === index){ fill.style.width = '0%';  fill.style.transition = 'none'; }
        else                 { fill.style.width = '0%';  fill.style.transition = 'none'; }
      });
      trackAudioProgress(index);

      preloadNextAudio(index);

      _playTimeout = setTimeout(() => { _playTimeout = null; playCurrentScene(); }, 500);
    }

    function preloadNextAudio(currentIdx) {
      if (!story || currentIdx >= story.scenes.length - 1) return;
      const nextScene = story.scenes[currentIdx + 1];
      const audio = document.getElementById(`audio-${nextScene.id}`);
      if (audio && audio.readyState < 2) audio.load();
    }

    let _tlHandler = null;
    let _tlAudio   = null;

    function trackAudioProgress(index) {
      if (_tlHandler && _tlAudio) {
        _tlAudio.removeEventListener('timeupdate', _tlHandler);
      }
      const scene = story.scenes[index];
      const audio = document.getElementById(`audio-${scene.id}`);
      if (!audio) return;
      _tlAudio   = audio;
      _tlHandler = () => {
        if (!audio.duration) return;
        // Timeline progress bar
        const pct  = (audio.currentTime / audio.duration) * 100;
        const fill = document.getElementById(`tl-fill-${index}`);
        if (fill) { fill.style.transition = 'width 0.25s linear'; fill.style.width = pct + '%'; }
        // Compute word offsets once spans are ready and duration is known
        if (!_wordOffsets.length && _wordSpans.length) {
          const sc  = story.scenes[index];
          const txt = storyLang === 'en' && sc.text_en ? sc.text_en
            : storyLang === 'te_en' && sc.text_te_en ? sc.text_te_en
            : (sc.text || '');
          computeWordOffsets(audio.duration, txt);
        }
        highlightWordAtTime(audio.currentTime);
      };
      audio.addEventListener('timeupdate', _tlHandler);
    }

    function playCurrentScene() {
      if (_fallbackTimer) { clearTimeout(_fallbackTimer); _fallbackTimer = null; }
      const scene = story.scenes[currentIndex];
      const audio = document.getElementById(`audio-${scene.id}`);
      if (!audio) return;
      audio.muted        = isMuted;
      audio.playbackRate = currentSpeed;
      audio.currentTime  = 0;
      audio.play().then(() => {
        isPlaying = true;
        updatePlayBtn();
      }).catch(() => {
        // Audio unavailable locally — auto-advance after text-length-based delay
        isPlaying = false;
        updatePlayBtn();
        const textLen = (scene.text_en || scene.text).length;
        const delay   = Math.max(4000, Math.min(9000, textLen * 35));
        _fallbackTimer = setTimeout(() => nextScene(), delay);
      });
    }

    function stopAllAudio() {
      if (_fallbackTimer) { clearTimeout(_fallbackTimer); _fallbackTimer = null; }
      if (!story) return;
      story.scenes.forEach(scene => {
        const audio = document.getElementById(`audio-${scene.id}`);
        if (audio) { audio.pause(); audio.currentTime = 0; }
      });
      clearWordHighlight();
      isPlaying = false;
      updatePlayBtn();
    }

    function toggleCurrentAudio() {
      const scene = story.scenes[currentIndex];
      const audio = document.getElementById(`audio-${scene.id}`);
      if (!audio) return;
      if (isPlaying) {
        audio.pause();
        if (_fallbackTimer) { clearTimeout(_fallbackTimer); _fallbackTimer = null; }
        isPlaying = false;
        updatePlayBtn();
      } else {
        // Resume from where we paused — do NOT reset currentTime
        if (_fallbackTimer) { clearTimeout(_fallbackTimer); _fallbackTimer = null; }
        audio.muted        = isMuted;
        audio.playbackRate = currentSpeed;
        audio.play().then(() => {
          isPlaying = true;
          updatePlayBtn();
        }).catch(() => {});
      }
    }

    function updatePlayBtn() {
      const btn = document.getElementById('play-pause-btn');
      if (!btn) return;
      if (storyLang === 'te') {
        btn.textContent = isPlaying ? '⏸ ఆపు' : '▶ వినండి';
      } else {
        btn.textContent = isPlaying ? '⏸ Pause' : '▶ Listen';
      }
    }

    function nextScene() {
      if (!story) return;
      if (currentIndex < story.scenes.length - 1) {
        showScene(currentIndex + 1);
      } else {
        stopAllAudio();
        document.getElementById('slideshow').style.display = 'none';
        document.getElementById('moral-screen').style.display = 'flex';
        loadRelatedStories();
      }
    }

    function prevScene() {
      if (currentIndex > 0) showScene(currentIndex - 1);
    }

    function goToScene(index) { showScene(index); }

    // ── MUTE ──────────────────────────────────────────────────────────────────
    function toggleMute() {
      isMuted = !isMuted;
      const btn = document.getElementById('mute-btn');
      btn.textContent = isMuted ? '🔇' : '🔊';
      btn.classList.toggle('muted', isMuted);
      applyAudioSettingsAll();
    }

    // ── LANGUAGE ──────────────────────────────────────────────────────────────
    const UI_TEXT = {
      te: {
        backLink:     '← అన్ని కథలు',
        moralHeading: 'కథ సమాప్తం',
        moralLabel:   'నీతి',
        shareBtn:     '📤 పంచుకోండి',
        homeBtn:      '← అన్ని కథలు',
      },
      te_en: {
        backLink:     '← All Stories',
        moralHeading: 'Story Complete',
        moralLabel:   'Moral',
        shareBtn:     '📤 Share',
        homeBtn:      '← All Stories',
      },
      en: {
        backLink:     '← All Stories',
        moralHeading: 'Story Complete',
        moralLabel:   'Moral',
        shareBtn:     '📤 Share',
        homeBtn:      '← All Stories',
      }
    };

    function storySetLang(lang) {
      storyLang = lang;
      localStorage.setItem('tk_lang', lang);

      // Toggle lang-switch buttons
      document.querySelectorAll('#story-lang-switch .lang-btn').forEach(b => {
        const isActive = b.dataset.lang === lang;
        b.classList.toggle('active', isActive);
        b.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });

      // Update every static UI string
      const t = UI_TEXT[lang] || UI_TEXT.te;
      const el = id => document.getElementById(id);
      el('back-link')     && (el('back-link').textContent     = t.backLink);
      el('moral-heading') && (el('moral-heading').textContent = t.moralHeading);
      el('moral-label')   && (el('moral-label').textContent   = t.moralLabel);
      el('share-btn')     && (el('share-btn').textContent     = t.shareBtn);
      el('moral-home-btn')&& (el('moral-home-btn').textContent= t.homeBtn);
      updatePlayBtn();

      if (!story) return;

      // Refresh scene text + title
      const scene     = story.scenes[currentIndex];
      const sceneText = lang === 'en' && scene.text_en ? scene.text_en
        : lang === 'te_en' && scene.text_te_en ? scene.text_te_en
        : scene.text;
      el('slide-story-title').textContent =
        lang === 'en' && story.title_en ? story.title_en
        : lang === 'te_en' && story.title_te_en ? story.title_te_en
        : story.title;
      renderWordSpans(sceneText, scene.id);
      const audio = el(`audio-${scene.id}`);
      if (audio && audio.duration) computeWordOffsets(audio.duration, sceneText);

      // Moral screen
      el('final-title').textContent =
        lang === 'en' && story.title_en ? story.title_en
        : lang === 'te_en' && story.title_te_en ? story.title_te_en
        : story.title;
      el('final-moral').textContent =
        lang === 'en' && story.moral_en ? story.moral_en
        : lang === 'te_en' && story.moral_te_en ? story.moral_te_en
        : story.moral;
    }

    // ── SPEED ─────────────────────────────────────────────────────────────────
    function setSpeed(s) {
      currentSpeed = s;
      document.querySelectorAll('.speed-btn').forEach(btn => {
        btn.classList.toggle('active', parseFloat(btn.textContent) === s);
      });
      applyAudioSettingsAll();
    }

    function applyAudioSettingsAll() {
      if (!story) return;
      story.scenes.forEach(scene => {
        const audio = document.getElementById(`audio-${scene.id}`);
        if (audio) {
          audio.muted        = isMuted;
          audio.playbackRate = currentSpeed;
        }
      });
    }

    // ── FAVORITES ─────────────────────────────────────────────────────────────
    function getFavorites() {
      return JSON.parse(localStorage.getItem('telugu_kathalu_favorites') || '[]');
    }

    function loadFavoriteState() {
      const btn = document.getElementById('fav-btn');
      if (!btn) return;
      const isFav = getFavorites().includes(storyFolderId);
      btn.textContent = isFav ? '♥' : '♡';
      btn.classList.toggle('active', isFav);
    }

    function toggleFavorite() {
      const favs = getFavorites();
      const idx  = favs.indexOf(storyFolderId);
      if (idx === -1) favs.push(storyFolderId);
      else favs.splice(idx, 1);
      localStorage.setItem('telugu_kathalu_favorites', JSON.stringify(favs));
      loadFavoriteState();
    }

    // ── SHARE ─────────────────────────────────────────────────────────────────
    function shareStory() {
      const url  = window.location.href;
      const text = story ? `"${story.title}" చదవండి - తెలుగు కథలు\n` : '';
      if (navigator.share) {
        navigator.share({ title: story ? story.title : 'తెలుగు కథలు', text: story ? story.moral : '', url })
          .catch(() => {});
      } else {
        window.open(`whatsapp://send?text=${encodeURIComponent(text + url)}`, '_blank');
      }
    }

    // ── RELATED STORIES ───────────────────────────────────────────────────────
    async function loadRelatedStories() {
      const container = document.getElementById('related-stories');
      if (!story || !container) return;
      try {
        const res  = await fetch('stories/index.json');
        const data = await res.json();
        const all  = data.stories || [];

        let pool = all.filter(s => s.id !== storyFolderId && s.subcategory === story.subcategory);
        if (pool.length < 3)
          pool = all.filter(s => s.id !== storyFolderId && s.category === story.category);
        if (pool.length === 0) return;

        // Pick up to 3 random
        const picks = pool.sort(() => Math.random() - 0.5).slice(0, 3);

        container.innerHTML = `<h3>మరిన్ని కథలు చదవండి</h3>`;
        picks.forEach(s => {
          const div = document.createElement('div');
          div.className = 'related-card';
          div.onclick = () => window.location.href = `story.html?id=${s.slug || s.id}`;
          div.innerHTML = `
            <img class="related-card-thumb" src="${s.thumbnail}" alt="${s.title}" loading="lazy">
            <div>
              <div class="related-card-title">${s.title}</div>
              <div class="related-card-cat">${CATEGORIES[s.category] || s.category}</div>
            </div>`;
          container.appendChild(div);
        });
      } catch(e) {}
    }

    // ── JSON-LD ────────────────────────────────────────────────────────────────
    function injectJSONLD(s, id) {
      const ld = {
        "@context": "https://schema.org",
        "@type": "Article",
        "name": s.title,
        "description": s.moral,
        "url": window.location.href,
        "datePublished": s.date,
        "inLanguage": "te",
        "image": s.thumbnail ? 'https://telugukathalu.in/' + s.thumbnail : undefined,
        "publisher": { "@type": "Organization", "name": "Telugu Katalu", "url": "https://telugukathalu.in" }
      };
      const script = document.createElement('script');
      script.type = 'application/ld+json';
      script.textContent = JSON.stringify(ld);
      document.head.appendChild(script);
    }

    // ── SWIPE ─────────────────────────────────────────────────────────────────
    function setupSwipeGesture() {
      const area = document.getElementById('swipe-area');
      area.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      area.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
          if (dx < 0) nextScene(); else prevScene();
        } else if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
          toggleCurrentAudio();
        }
      }, { passive: true });
    }

    // ── KEYBOARD ──────────────────────────────────────────────────────────────
    function setupKeyboard() {
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') nextScene();
        if (e.key === 'ArrowLeft')  prevScene();
        if (e.key === ' ') { e.preventDefault(); toggleCurrentAudio(); }
      });
    }

    loadStory();
  </script>
