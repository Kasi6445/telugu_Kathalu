<!DOCTYPE html>
<html lang="te">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>తెలుగు కథలు</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="static/icon-192.png">
  <meta name="theme-color" content="#FF6B35">
  <link rel="stylesheet" href="static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-P9CPL3SZHQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-P9CPL3SZHQ');
    gtag('config', 'G-4EYTPBHZJ6');
  </script>

</head>

<body class="slideshow-mode">

  <div id="slideshow">
    <div id="bg-image"></div>

    <!-- Top bar -->
    <div id="top-bar">
      <a href="index.html" id="back-link">← అన్ని కథలు</a>
      <span id="scene-counter">1 / 6</span>
      <button id="fav-btn" onclick="toggleFavorite()" title="నా కథలు">♡</button>
    </div>

    <!-- Swipe area — covers full screen -->
    <div id="swipe-area">
      <!-- Tap zones -->
      <div id="tap-left" onclick="prevScene()"></div>
      <div id="tap-right" onclick="nextScene()"></div>
    </div>

    <!-- Bottom content -->
    <div id="bottom-content">
      <p id="slide-story-title"></p>
      <p id="slide-text"></p>

      <!-- Controls -->
      <div id="bottom-bar">
        <button class="ctrl-btn nav-btn" onclick="prevScene()">←</button>
        <button class="ctrl-btn" id="play-pause-btn" onclick="toggleCurrentAudio()">▶ వినండి</button>
        <button class="ctrl-btn nav-btn" onclick="nextScene()">→</button>
      </div>

      <!-- Segmented timeline -->
      <div id="timeline"></div>
    </div>
  </div>

  <!-- Moral screen -->
  <div id="moral-screen" style="display:none;">
    <div id="moral-content">
      <div class="moral-emoji">🌟</div>
      <h2>కథ సమాప్తం</h2>
      <p id="final-title"></p>
      <div id="moral-label">నీతి</div>
      <p id="final-moral"></p>
      <button id="share-btn" onclick="shareStory()">📤 పంచుకోండి</button>
      <a href="index.html" class="home-btn">← అన్ని కథలు</a>
      <div id="related-stories"></div>
    </div>
  </div>

  <script>
    let story        = null;
    let currentIndex = 0;
    let isPlaying    = false;
    let touchStartX  = 0;
    let touchStartY  = 0;
    let imgExt       = 'jpg';

    const CATEGORIES = {
      neeti:        'నీతి కథలు',
      podupu:       'పొడుపు కథలు',
      tenali:       'తెనాలి రామ',
      panchatantra: 'పంచతంత్రం',
      ramayana:     'రామాయణం',
      samethalu:    'సామెతలు',
      janapada:     'జానపదం',
      bhagavatam:   'భాగవతం'
    };

    function getStoryId() {
      return new URLSearchParams(window.location.search).get('id');
    }

    async function loadStory() {
      const id = getStoryId();
      if (!id) { window.location.href = 'index.html'; return; }

      try {
        const res = await fetch(`stories/${id}/story.json`);
        story = await res.json();

        // Derive image extension from thumbnail
        imgExt = story.thumbnail ? story.thumbnail.split('.').pop() : 'jpg';

        document.title = story.title + ' - తెలుగు కథలు';
        document.getElementById('final-title').textContent = story.title;
        document.getElementById('final-moral').textContent = story.moral;

        injectJSONLD(story, id);
        loadFavoriteState();

        // Build audio elements
        story.scenes.forEach(scene => {
          const audio = document.createElement('audio');
          audio.id    = `audio-${scene.id}`;
          audio.src   = `stories/${id}/audio/scene${scene.id}.mp3`;
          audio.onended = () => {
            isPlaying = false;
            updatePlayBtn();
            setTimeout(() => nextScene(), 800);
          };
          document.body.appendChild(audio);
        });

        // Preload images
        story.scenes.forEach(scene => {
          const img = new Image();
          img.src = `stories/${id}/images/scene${scene.id}.${imgExt}`;
        });

        // Build segmented timeline
        const tl = document.getElementById('timeline');
        story.scenes.forEach((_, i) => {
          const seg  = document.createElement('div');
          seg.className = 'tl-seg';
          seg.title = `Scene ${i + 1}`;
          const fill = document.createElement('div');
          fill.className = 'tl-fill';
          fill.id = `tl-fill-${i}`;
          seg.appendChild(fill);
          seg.onclick = () => goToScene(i);
          tl.appendChild(seg);
        });

        setupSwipeGesture();
        setupKeyboard();
        showScene(0);

      } catch(e) {
        console.error(e);
      }
    }

    function showScene(index) {
      if (!story) return;
      stopAllAudio();
      currentIndex = index;
      const scene = story.scenes[index];
      const id    = getStoryId();

      const bg = document.getElementById('bg-image');
      bg.style.opacity = '0';
      setTimeout(() => {
        bg.style.backgroundImage = `url('stories/${id}/images/scene${scene.id}.${imgExt}')`;
        bg.style.opacity = '1';
      }, 250);

      const textEl  = document.getElementById('slide-text');
      const titleEl = document.getElementById('slide-story-title');
      textEl.style.opacity = '0';
      setTimeout(() => {
        titleEl.textContent = story.title;
        textEl.textContent  = scene.text;
        textEl.style.opacity = '1';
      }, 250);

      document.getElementById('scene-counter').textContent =
        `${index + 1} / ${story.scenes.length}`;

      // Update segmented timeline fills
      story.scenes.forEach((_, i) => {
        const fill = document.getElementById(`tl-fill-${i}`);
        if (!fill) return;
        if (i < index)      { fill.style.width = '100%'; fill.style.transition = 'none'; }
        else if (i === index){ fill.style.width = '0%';  fill.style.transition = 'none'; }
        else                 { fill.style.width = '0%';  fill.style.transition = 'none'; }
      });
      trackAudioProgress(index);

      // Preload next scene audio while current scene shows
      preloadNextAudio(index);

      setTimeout(() => playCurrentScene(), 500);
    }

    function preloadNextAudio(currentIdx) {
      if (!story || currentIdx >= story.scenes.length - 1) return;
      const nextScene = story.scenes[currentIdx + 1];
      const audio = document.getElementById(`audio-${nextScene.id}`);
      if (audio && audio.readyState < 2) audio.load();
    }

    let _tlHandler = null;
    let _tlAudio   = null;

    function trackAudioProgress(index) {
      // Detach previous listener
      if (_tlHandler && _tlAudio) {
        _tlAudio.removeEventListener('timeupdate', _tlHandler);
      }
      const scene = story.scenes[index];
      const audio = document.getElementById(`audio-${scene.id}`);
      if (!audio) return;
      _tlAudio = audio;
      _tlHandler = () => {
        if (!audio.duration) return;
        const pct  = (audio.currentTime / audio.duration) * 100;
        const fill = document.getElementById(`tl-fill-${index}`);
        if (fill) { fill.style.transition = 'width 0.25s linear'; fill.style.width = pct + '%'; }
      };
      audio.addEventListener('timeupdate', _tlHandler);
    }

    function playCurrentScene() {
      const scene = story.scenes[currentIndex];
      const audio = document.getElementById(`audio-${scene.id}`);
      if (audio) {
        audio.currentTime = 0;
        audio.play().catch(() => {});
        isPlaying = true;
        updatePlayBtn();
      }
    }

    function stopAllAudio() {
      if (!story) return;
      story.scenes.forEach(scene => {
        const audio = document.getElementById(`audio-${scene.id}`);
        if (audio) { audio.pause(); audio.currentTime = 0; }
      });
      isPlaying = false;
      updatePlayBtn();
    }

    function toggleCurrentAudio() {
      const scene = story.scenes[currentIndex];
      const audio = document.getElementById(`audio-${scene.id}`);
      if (!audio) return;
      if (isPlaying) {
        audio.pause();
        isPlaying = false;
      } else {
        audio.play().catch(() => {});
        isPlaying = true;
      }
      updatePlayBtn();
    }

    function updatePlayBtn() {
      const btn = document.getElementById('play-pause-btn');
      if (btn) btn.textContent = isPlaying ? '⏸ ఆపు' : '▶ వినండి';
    }

    function nextScene() {
      if (!story) return;
      if (currentIndex < story.scenes.length - 1) {
        showScene(currentIndex + 1);
      } else {
        stopAllAudio();
        document.getElementById('slideshow').style.display = 'none';
        document.getElementById('moral-screen').style.display = 'flex';
        loadRelatedStories();
      }
    }

    function prevScene() {
      if (currentIndex > 0) showScene(currentIndex - 1);
    }

    function goToScene(index) { showScene(index); }

    // ── FAVORITES ─────────────────────────────────────────────────────────────
    function getFavorites() {
      return JSON.parse(localStorage.getItem('telugu_kathalu_favorites') || '[]');
    }

    function loadFavoriteState() {
      const btn = document.getElementById('fav-btn');
      if (!btn) return;
      const isFav = getFavorites().includes(getStoryId());
      btn.textContent = isFav ? '♥' : '♡';
      btn.classList.toggle('active', isFav);
    }

    function toggleFavorite() {
      const id   = getStoryId();
      const favs = getFavorites();
      const idx  = favs.indexOf(id);
      if (idx === -1) favs.push(id);
      else favs.splice(idx, 1);
      localStorage.setItem('telugu_kathalu_favorites', JSON.stringify(favs));
      loadFavoriteState();
    }

    // ── SHARE ─────────────────────────────────────────────────────────────────
    function shareStory() {
      const url  = window.location.href;
      const text = story ? `"${story.title}" చదవండి - తెలుగు కథలు\n` : '';
      if (navigator.share) {
        navigator.share({ title: story ? story.title : 'తెలుగు కథలు', text: story ? story.moral : '', url })
          .catch(() => {});
      } else {
        window.open(`whatsapp://send?text=${encodeURIComponent(text + url)}`, '_blank');
      }
    }

    // ── RELATED STORIES ───────────────────────────────────────────────────────
    async function loadRelatedStories() {
      const container = document.getElementById('related-stories');
      if (!story || !container) return;
      try {
        const res  = await fetch('stories/index.json');
        const data = await res.json();
        const all  = data.stories || [];
        const id   = getStoryId();

        let pool = all.filter(s => s.id !== id && s.subcategory === story.subcategory);
        if (pool.length < 3)
          pool = all.filter(s => s.id !== id && s.category === story.category);
        if (pool.length === 0) return;

        // Pick up to 3 random
        const picks = pool.sort(() => Math.random() - 0.5).slice(0, 3);

        container.innerHTML = `<h3>మరిన్ని కథలు చదవండి</h3>`;
        picks.forEach(s => {
          const div = document.createElement('div');
          div.className = 'related-card';
          div.onclick = () => window.location.href = `story.html?id=${s.id}`;
          div.innerHTML = `
            <img class="related-card-thumb" src="${s.thumbnail}" alt="${s.title}" loading="lazy">
            <div>
              <div class="related-card-title">${s.title}</div>
              <div class="related-card-cat">${CATEGORIES[s.category] || s.category}</div>
            </div>`;
          container.appendChild(div);
        });
      } catch(e) {}
    }

    // ── JSON-LD ────────────────────────────────────────────────────────────────
    function injectJSONLD(s, id) {
      const ld = {
        "@context": "https://schema.org",
        "@type": "Article",
        "name": s.title,
        "description": s.moral,
        "url": window.location.href,
        "datePublished": s.date,
        "inLanguage": "te",
        "image": s.thumbnail ? 'https://telugukathalu.in/' + s.thumbnail : undefined,
        "publisher": { "@type": "Organization", "name": "Telugu Katalu", "url": "https://telugukathalu.in" }
      };
      const script = document.createElement('script');
      script.type = 'application/ld+json';
      script.textContent = JSON.stringify(ld);
      document.head.appendChild(script);
    }

    // ── SWIPE ─────────────────────────────────────────────────────────────────
    function setupSwipeGesture() {
      const area = document.getElementById('swipe-area');
      area.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      area.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
          if (dx < 0) nextScene(); else prevScene();
        } else if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
          toggleCurrentAudio();
        }
      }, { passive: true });
    }

    // ── KEYBOARD ──────────────────────────────────────────────────────────────
    function setupKeyboard() {
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') nextScene();
        if (e.key === 'ArrowLeft')  prevScene();
        if (e.key === ' ') { e.preventDefault(); toggleCurrentAudio(); }
      });
    }

    loadStory();
  </script>

</body>

</html>
